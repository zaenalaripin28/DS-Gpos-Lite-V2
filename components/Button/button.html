<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button — DS GPOS Lite V2</title>
  <link rel="stylesheet" href="../../styles/globals.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neutral: {
              n20:  '#F5F6F7',
              n30:  '#EBEDF0',
              n40:  '#DFE2E6',
              n900: '#091E42',
            },
          },
          fontFamily: {
            primary: ['Poppins', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          borderRadius: {
            component: '6px',
          },
          boxShadow: {
            focus: '0 0 0 3px rgba(30, 127, 214, 0.25)',
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen flex items-center justify-center bg-[var(--color-background)]">

  <button
    type="button"
    class="inline-flex items-center justify-center gap-1 px-3 py-2 rounded-component bg-neutral-n20 text-neutral-n900 font-primary text-sm font-medium leading-5 border-0 cursor-pointer whitespace-nowrap transition-all duration-200 hover:bg-neutral-n30 active:bg-neutral-n40 active:translate-y-px active:scale-[.98] focus-visible:outline-none focus-visible:shadow-focus disabled:opacity-40 disabled:cursor-not-allowed disabled:pointer-events-none"
  >
    Button
  </button>

</body>
</html>
